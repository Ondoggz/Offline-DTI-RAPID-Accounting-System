#version: "3.9"

services:
  client:
    build: ./client
    container_name: dti_client
    ports:
      - "5173:5173"
    volumes:
      - ./client:/app
      - /app/node_modules
    environment:
      VITE_API_URL: http://localhost:3000
    depends_on:
      - server

  server:
    build: ./server
    container_name: dti_server
    ports:
      - "3000:3000"
    volumes:
      - ./server:/app
      - /app/node_modules
    environment:
      PORT: 3000
      DATABASE_URL: mongodb+srv://byss:143Uriel@accountingsystem-dti.ftzf4vc.mongodb.net/test?retryWrites=true&w=majority&appName=AccountingSystem-DTI
      FRONTEND_URL: http://localhost:5173
      JWT_SECRET: your_super_secret_key
    depends_on:
      - mongo

  mongo:
    image: mongo:7
    container_name: dti_mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: dti_db
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data: